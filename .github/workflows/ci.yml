name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Configure git identity (needed by tests that run git commit)
        run: |
          git config --global user.email "ci@primitiv.dev"
          git config --global user.name "Primitiv CI"
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: npx vitest run
