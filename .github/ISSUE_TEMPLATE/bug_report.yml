name: Bug Report
description: Report a bug in Primitiv
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `primitiv init`
        2. Run `/primitiv.specify ...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or screenshots if relevant.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Primitiv Version
      description: Run `primitiv --version` to find this.
      placeholder: "1.0.4"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js Version
      description: Run `node --version` to find this.
      placeholder: "v20.10.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
